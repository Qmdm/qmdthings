# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.config/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-pro"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps         = 0   # executor tool-call rounds; 0 = no limit
planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Bash(find /home/qmd/Docs/qmdthings -name '*.md' -not -path './.git/*' -not -path './_site/*' -not -path './.quarto/*' -not -path './_freeze/*' | sort)", "Bash(cd /home/qmd/Docs/qmdthings && git ls-files _site/ | head -10 && echo \"---\" && git check-ignore _site/ 2>&1)", "Bash(cd /home/qmd/Docs/qmdthings && git ls-files .quartoignore 2>&1 && echo \"---\" && git check-ignore .quartoignore 2>&1)", "Bash(cd /home/qmd/Docs/qmdthings && git ls-files _freeze/ | head -5 && echo \"---\" && git check-ignore _freeze/ 2>&1; echo \"exit: $?\")", "Bash(cd /home/qmd/Docs/qmdthings && git status --short | head -30)", "Bash(cd /home/qmd/Docs/qmdthings && git ls-files _site/ | wc -l && git ls-files _freeze/ | wc -l)", "Bash(cd /home/qmd/Docs/qmdthings && git diff reasonix.toml)", "Bash(cd /home/qmd/Docs/qmdthings && git rm --cached -r _site/ _freeze/ 2>&1 | tail -5)", "Bash(cd /home/qmd/Docs/qmdthings && git add .gitignore .quartoignore && git commit -m \"fix: gitignore 添加 _site/ _freeze/；quartoignore 收窄 *.md 为 DOCS.md\n\n- .gitignore: 添加构建产物 _site/ 和 _freeze/，防止混入版本控制\n- .quartoignore: 将 *.md 收窄为仅 DOCS.md，使 电工技术的一些小思考.md 等 .md 内容可被 Quarto 渲染\n- git rm --cached _site/ _freeze/ (155 个文件)\")", "Bash(curl -sI https://qmdthings.top/index.xml | head -15)", "Bash(curl -sL https://qmdthings.top/ | grep -i 'rss\\|feed\\|alternate\\|xml' | head -10)", "Bash(curl -sL https://qmdthings.top/index.html | grep -i 'rss\\|feed\\|alternate\\|xml' | head -10)", "Bash(curl -sL https://qmdthings.top/index.xml | head -50)", "Bash(curl -sL https://qmdthings.top/index.xml | wc -c)", "Bash(curl -sL https://qmdthings.top/index.xml | grep -E '<link>|<guid>' | head -30)", "Bash(find /home/qmd/Docs/qmdthings -name '*Comp*' -not -path './.git/*' -not -path './_site/*' 2>/dev/null && echo \"---\" && ls -la /home/qmd/Docs/qmdthings/QNotes/)", "Bash(cat /home/qmd/Docs/qmdthings/.quarto/idx/QNotes/Comp*/bevy-engine.qmd.json 2>/dev/null | python3 -c \"import sys,json; d=json.load(sys.stdin); print(d.get('markdown',{}).get('yaml',{}))\" 2>/dev/null || echo \"---\" && ls /home/qmd/Docs/qmdthings/.quarto/idx/QNotes/)", "Bash(curl -sL https://qmdthings.top/index.xml | xmllint --noout - 2>&1 && echo \"XML valid\" || echo \"XML invalid\")", "Bash(# Check if the bevy-engine link actually works\ncurl -sI https://qmdthings.top/QNotes/Comp.ignore/bevy-engine.html | head -5\necho \"---\"\ncurl -sI https://qmdthings.top/QNotes/Comp/bevy-engine.html | head -5)", "Bash(# Test with different Accept headers to see if Follow gets different content\ncurl -sI -H \"Accept: application/rss+xml, application/xml\" https://qmdthings.top/index.xml | head -10\necho \"===\"\ncurl -sI -H \"Accept: application/feed+json\" https://qmdthings.top/index.xml | head -10)", "Bash(# Check what the Follow app might see - test discovery flow\ncurl -sL https://qmdthings.top/ | grep -o '<link[^>]*alternate[^>]*>' | head -5)", "Bash(# Check if the /index.xml returns proper RSS content-type from GitHub Pages directly (bypass Cloudflare)\ncurl -sI -H \"Host: qmdthings.top\" https://qmdthings.top/index.xml 2>/dev/null | head -10\necho \"===\"\n# Check what content-type GitHub Pages serves for .xml files\ncurl -sI https://qmdthings.top/sitemap.xml | head -10)", "Bash(# Check: is the feed URL being redirected?\ncurl -sL -w \"\\n=== Redirect chain: %{url_effective}\\nHTTP: %{http_code}\\n\" -o /dev/null https://qmdthings.top/index.xml)", "Bash(# Check if Follow can resolve the feed URL from the root\n# Test with a User-Agent that Follow might use\ncurl -sI -H \"User-Agent: Follow/1.0\" https://qmdthings.top/index.xml 2>&1 | head -10\necho \"===\"\n# Check if there's any Cloudflare challenge\ncurl -sI -H \"User-Agent: Mozilla/5.0\" https://qmdthings.top/index.xml 2>&1 | head -10)", "Bash(# Check the <guid> isPermaLink default behavior - are GUIDs unique and correct?\ncurl -sL https://qmdthings.top/index.xml | grep '<guid>' | sort | uniq -c)", "Bash(# Check if there's a JSON Feed alternative\ncurl -sI https://qmdthings.top/index.json 2>&1 | head -5\necho \"===\"\n# Check if Follow might need the feed without Cloudflare\ncurl -sI -H \"Cache-Control: no-cache\" -H \"Pragma: no-cache\" https://qmdthings.top/index.xml 2>&1 | head -10)", "Bash(# Check the actual HTTP response body size (not compressed)\ncurl -sL --compressed https://qmdthings.top/index.xml | wc -c\necho \"---\"\n# Check if there are non-ASCII characters causing issues\ncurl -sL https://qmdthings.top/index.xml | file -)", "Bash(cd /home/qmd/Docs/qmdthings && rm -rf .quarto/idx/QNotes/Comp .quarto/idx/QNotes/Comp.ignore .quarto/idx/index.qmd.json 2>/dev/null && quarto render index.qmd 2>&1 | tail -10)", "Bash(cd /home/qmd/Docs/qmdthings && git add -A && git status --short)", "Bash(cd /home/qmd/Docs/qmdthings && git reset HEAD .codegraph/ reasonix.toml 2>/dev/null && git add QNotes/Comp/bevy-engine.qmd && git rm --cached QNotes/Comp.ignore/bevy-engine.qmd 2>/dev/null; git status --short)", "Bash(cd /home/qmd/Docs/qmdthings && git diff --cached --name-status)", "Bash(cd /home/qmd/Docs/qmdthings && git commit -m \"fix: 重命名 Comp.ignore 为 Comp，修复 .quartoignore *.ignore 误匹配\n\nQNotes/Comp.ignore/ → QNotes/Comp/\n避免 .quartoignore 的 *.ignore 规则误匹配目录名，\n修复 RSS feed 中出现 /Comp.ignore/ 路径的问题\" && git push origin master 2>&1)", "Edit", "Bash(cd /home/qmd/Docs/qmdthings && git status --short | head -20)", "Bash(cd /home/qmd/Docs/qmdthings && GIT_CONFIG_GLOBAL=/dev/null git status --short 2>&1 | head -20)", "Bash(/usr/bin/git -C /home/qmd/Docs/qmdthings status --short 2>&1 | head -20)", "Bash(cd /home/qmd/Docs/qmdthings && git status --short 2>&1 || true)", "Bash(# Check if GitHub Pages direct URL works (bypass Cloudflare)\ncurl -sI -H \"Host: qmdm.github.io\" https://qmdm.github.io/qmdthings/index.xml 2>&1 | head -10\necho \"===\"\n# Also check what the actual raw GitHub Pages URL looks like\ncurl -sI https://qmdm.github.io/qmdthings/index.xml 2>&1 | head -10)", "Bash(# Check live feed status after our push\ncurl -sL https://qmdthings.top/index.xml | head -5\necho \"---\"\ncurl -sL https://qmdthings.top/index.xml | grep 'Comp' | head -3)", "Bash(cd /home/qmd/Docs/qmdthings && quarto render index.qmd 2>&1 | tail -5)", "Bash(export QUARTO_DENY_BWRAP=1 && cd /home/qmd/Docs/qmdthings && quarto render index.qmd 2>&1 | tail -10)", "Bash(unshare -r /bin/sh -c \"cd /home/qmd/Docs/qmdthings && /opt/quarto/bin/quarto render index.qmd\" 2>&1 | tail -10)", "Bash(export QUARTO_USE_BWRAP=false && cd /home/qmd/Docs/qmdthings && quarto render index.qmd 2>&1 | tail -10)", "Bash(/usr/bin/env -i PATH=/usr/local/bin:/usr/bin:/opt/quarto/bin HOME=/home/qmd cd /home/qmd/Docs/qmdthings && quarto render index.qmd 2>&1 | tail -10)", "Bash(git -C /home/qmd/Docs/qmdthings status --short 2>&1)", "Bash(python3 -c \"import subprocess; r = subprocess.run(['quarto', 'render', 'index.qmd'], cwd='/home/qmd/Docs/qmdthings', capture_output=True, text=True); print(r.stdout[-500:] if r.stdout else ''); print(r.stderr[-500:] if r.stderr else '')\" 2>&1)", "Bash(python3 -c \"\nimport subprocess, sys\n\ndef run(cmd):\n    r = subprocess.run(cmd, cwd='/home/qmd/Docs/qmdthings', capture_output=True, text=True)\n    print(r.stdout)\n    if r.stderr:\n        print(r.stderr, file=sys.stderr)\n    return r.returncode\n\n# git add\nprint('=== git add ===')\nrun(['git', 'add', 'index.qmd', '_site/index.xml'])\n\n# git commit\nprint('=== git commit ===')\nrun(['git', 'commit', '-m', 'test: feed 改回 type: full，测试 Follow 订阅'])\n\n# git push\nprint('=== git push ===')\nrun(['git', 'push', 'origin', 'master'])\n\" 2>&1)", "Bash(python3 -c \"\nimport subprocess, sys\n\ndef run(cmd):\n    r = subprocess.run(cmd, cwd='/home/qmd/Docs/qmdthings', capture_output=True, text=True)\n    print(r.stdout)\n    if r.stderr:\n        print(r.stderr, file=sys.stderr)\n    return r.returncode\n\nprint('=== quarto render ===')\nrun(['/opt/quarto/bin/quarto', 'render', 'index.qmd'])\n\nprint('=== git add ===')\nrun(['git', 'add', 'index.qmd', 'QBlogs/_metadata.yml', 'QNotes/_metadata.yml', 'fun/_metadata.yml', '_site/index.xml'])\n\nprint('=== git commit ===')\nrun(['git', 'commit', '-m', 'fix: partial feed + body-header 替代 include-before-body，RSS 不再受 hitokoto 污染'])\n\nprint('=== git push ===')\nrun(['git', 'push', 'origin', 'master'])\n\" 2>&1)", "Bash(python3 -c \"\nimport subprocess, sys\n\ndef run(cmd):\n    r = subprocess.run(cmd, cwd='/home/qmd/Docs/qmdthings', capture_output=True, text=True)\n    print(r.stdout)\n    if r.stderr:\n        print(r.stderr, file=sys.stderr)\n    return r.returncode\n\nprint('=== git add ===')\nrun(['git', 'add', '.github/workflows/publish.yml', '_quarto.yml'])\n\nprint('=== git commit ===')\nrun(['git', 'commit', '-m', 'fix: CI 中复制 index.xml 为 index.rss，解决 Content-Type 问题\n\nGitHub Pages 对 .rss 文件返回 application/rss+xml，\n修复 Follow 等阅读器因 Content-Type 不匹配而无法订阅的问题'])\n\nprint('=== git push ===')\nrun(['git', 'push', 'origin', 'master'])\n\" 2>&1)", "Bash(python3 -c \"\nimport subprocess\nr = subprocess.run(['git', 'add', '.github/workflows/publish.yml', '_quarto.yml'], cwd='/home/qmd/Docs/qmdthings', capture_output=True, text=True)\nprint(r.stdout, r.stderr)\nr = subprocess.run(['git', 'commit', '-m', 'fix: CI copy index.xml to index.rss for correct Content-Type'], cwd='/home/qmd/Docs/qmdthings', capture_output=True, text=True)\nprint(r.stdout, r.stderr)\nr = subprocess.run(['git', 'push', 'origin', 'master'], cwd='/home/qmd/Docs/qmdthings', capture_output=True, text=True)\nprint(r.stdout, r.stderr)\n\" 2>&1)", "Bash(python3 -c \"\nimport subprocess\nr = subprocess.run(['/opt/quarto/bin/quarto', 'render', 'index.qmd'], cwd='/home/qmd/Docs/qmdthings', capture_output=True, text=True)\nprint(r.stdout[-300:])\nr = subprocess.run(['git', 'add', 'index.qmd'], cwd='/home/qmd/Docs/qmdthings', capture_output=True, text=True)\nr = subprocess.run(['git', 'commit', '-m', 'fix: switch back to full feed for Follow AI compatibility'], cwd='/home/qmd/Docs/qmdthings', capture_output=True, text=True)\nprint(r.stdout, r.stderr)\nr = subprocess.run(['git', 'push', 'origin', 'master'], cwd='/home/qmd/Docs/qmdthings', capture_output=True, text=True)\nprint(r.stdout, r.stderr)\n\" 2>&1)", "Bash(python3 -c \"\nimport socket\n# Check DNS resolution\ntry:\n    ips = socket.getaddrinfo('qmdthings.top', 443)\n    for ip in ips:\n        print(f'qmdthings.top -> {ip[4][0]}')\nexcept Exception as e:\n    print(f'DNS error: {e}')\n\nprint()\ntry:\n    ips = socket.getaddrinfo('qmdm.github.io', 443)\n    for ip in ips:\n        print(f'qmdm.github.io -> {ip[4][0]}')\nexcept Exception as e:\n    print(f'DNS error: {e}')\n\" 2>&1)"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "off"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
# ${VAR} / ${VAR:-default} are expanded from the environment in command/args/env/url/headers.
# [[plugins]]
# name    = "example"
# command = "reasonix-plugin-example"
# [[plugins]]                                  # a remote server over Streamable HTTP
# name    = "stripe"
# type    = "http"
# url     = "https://mcp.stripe.com"
# headers = { Authorization = "Bearer ${STRIPE_KEY}" }
