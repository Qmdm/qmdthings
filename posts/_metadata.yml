# options specified here will apply to all posts in this folder

# freeze computational output
# (see https://quarto.org/docs/projects/code-execution.html#freeze)
freeze: true

# Enable banner style title blocks
title-block-banner: true

page-navigation: true

license: "CC BY-NC-SA"

format:
  html:
    include-before-body: ../../_includes/hitokoto.html
    include-in-header:
      - text: |
          <style>
            .quarto-title-banner { position: relative; overflow: hidden; }
            #wind {
              position: absolute;
              inset: 0;
              width: 100%;
              height: 100%;
              z-index: 0;
            }
            .quarto-title-banner > .quarto-title {
              position: relative;
              z-index: 1;
            }
            .quarto-title-banner .title { color: #e8efff; }
          </style>
    include-after-body:
      - text: |
          <script>
            (function(){
              const banner = document.querySelector('.quarto-title-banner');
              if (!banner) return;
              const c = document.createElement('canvas');
              c.id = 'wind';
              banner.prepend(c);
            })();
          </script>
          <script src="../../_includes/hero.js" defer></script>
          <script src="../../_includes/auto-collapse.js" defer></script>
    code-tools:
      toggle: false
      caption: "Source Code"