project:
  type: website
  resources: [_includes, notes, posts, README.md, 404.qmd]
execute:
  freeze: auto

website:
  title: "QMD的杂物间"
  description: "琐事随笔"
  site-url: https://qmdthings.top
  # you must change this appropriately for RSS feeds to work properly

  reader-mode: true

  # Search
  search:
    location: sidebar

  # Page
  page-footer:
    center: "毎日マリーゴールドを1つ"
    right:
      - text: "Powered by quarto."
        href: https://quarto.org/

  # NavBar
  navbar:
    title: "Navi"
    background: "#4E9AB0"
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - sidebar:blogs
      - sidebar:notes
      - sidebar:fun
    right:
      - icon: rss
        href: index.xml
      - icon: github
        href: https://github.com

  # SideBar
  sidebar:
    - id: blogs
      title: "Blogs"
      contents: posts
    - id: notes
      title: "Notes"
      contents: notes
    - id: fun
      title: "Fun"
format:
  html:
    respect-user-color-scheme: true
    theme:
      light: flatly
      dark: darkly
    css: styles.css
    toc: true
