project:
  type: website
  resources: [assets, posts, notes, fun, error, setup, README.md]

execute:
  freeze: auto
  # Code
  message: false
  warning: false

website:
  title: "QMD的杂物间"
  description: "琐事随笔"
  site-url: https://qmdthings.top

  # ShareCard
  open-graph:
    image: "../../assets/share-cards/default.jpg"
    image-width: 1200
    image-height: 630
    locale: zh_CN
    
  twitter-card:
    image: "../../assets/share-cards/default.jpg"


  # you must change this appropriately for RSS feeds to work properly
  site-path: /
  reader-mode: true

  # Search
  search:
    location: sidebar

  # Page
  page-footer:
    center: "毎日マリーゴールドを1つ"
    right:
      - text: "Powered by quarto."
        href: https://quarto.org/

  # NavBar
  navbar:
    title: "Navi"
    background: "#4E9AB0"
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about/qmd.qmd
      - sidebar:blogs
      - sidebar:notes
      - sidebar:fun
    right:
      - icon: rss
        href: index.xml
      - icon: github
        href: https://github.com

  # SideBar
  sidebar:
    - id: blogs
      title: "Blogs"
      contents:
        - auto: posts
    - id: notes
      title: "Notes"
      contents:
        - auto: notes
    - id: fun
      title: "Fun"
      contents:
        - auto: fun

format:
  html:
    respect-user-color-scheme: true
    fig-format: svg
    include-after-body:
      - text: |
          <script src="../../assets/auto-collapse.js" defer></script>
          <script src="../../assets/svg.js" defer></script>
    # Code
    code-fold: true
    code-line-numbers: true

    theme:
      light: [flatly, custom.scss]
      dark: [darkly, custom.scss]
    css: styles.css
    toc: true
