# options specified here will apply to all posts in this folder

# freeze computational output
# (see https://quarto.org/docs/projects/code-execution.html#freeze)
freeze: true

# Enable banner style title blocks
title-block-banner: true

page-navigation: true

license: "CC BY-NC-SA"

format:
  html:
    include-in-header:
      - text: |
          <script>
            document.addEventListener("DOMContentLoaded", function () {
              const main = document.querySelector("main") || document.body;
              const p = document.createElement("p");
              p.id = "hitokoto";
              const a = document.createElement("a");
              a.id = "hitokoto_text";
              a.href = "#";
              a.style.textDecoration = "none";
              a.textContent = "hitokoto!";
              p.appendChild(a);
              main.prepend(p);
              fetch("https://v1.hitokoto.cn?c=k")
                .then(r => r.json())
                .then(data => {
                  a.href = "https://hitokoto.cn/?uuid=" + data.uuid;
                  a.textContent = data.hitokoto;
                })
                .catch(console.error);
              a.addEventListener("click", e => e.preventDefault());
            });
          </script>
          <style>
            .quarto-title-banner { position: relative; overflow: hidden; }
            #wind {
              position: absolute;
              inset: 0;
              width: 100%;
              height: 100%;
              z-index: 0;
            }
            .quarto-title-banner > .quarto-title {
              position: relative;
              z-index: 1;
            }
            .quarto-title-banner .title { color: #e8efff; }
          </style>
    include-after-body:
      - text: |
          <script>
            (function(){
              const banner = document.querySelector('.quarto-title-banner');
              if (!banner) return;
              const c = document.createElement('canvas');
              c.id = 'wind';
              banner.prepend(c);
            })();
          </script>
          <script src="../../assets/hero.js" defer></script>
          <script src="../../assets/auto-collapse.js" defer></script>
    code-tools:
      toggle: false
      caption: "Source Code"