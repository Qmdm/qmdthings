# options specified here will apply to all posts in this folder

# freeze computational output
# (see https://quarto.org/docs/projects/code-execution.html#freeze)
freeze: true

# Enable banner style title blocks
title-block-banner: true

page-navigation: true

license: "CC BY-NC-SA"

format:
  html:
    body-header: |
      <p id="hitokoto">
        <a href="#" id="hitokoto_text" style="text-decoration: none">hitokoto!</a>
      </p>
      <script>
        const hitokotoElement = document.querySelector("#hitokoto_text");
        fetch("https://v1.hitokoto.cn?c=k")
          .then((response) => response.json())
          .then((data) => {
            const hitokoto = document.querySelector("#hitokoto_text");
            hitokoto.href = `https://hitokoto.cn/?uuid=${data.uuid}`;
            hitokoto.innerText = data.hitokoto;
          })
          .catch(console.error);
        hitokotoElement.addEventListener("click", function (event) {
          event.preventDefault();
        });
      </script>
    include-in-header:
      - text: |
          <style>
            .quarto-title-banner { position: relative; overflow: hidden; }
            #wind {
              position: absolute;
              inset: 0;
              width: 100%;
              height: 100%;
              z-index: 0;
            }
            .quarto-title-banner > .quarto-title {
              position: relative;
              z-index: 1;
            }
            .quarto-title-banner .title { color: #e8efff; }
          </style>
    include-after-body:
      - text: |
          <script>
            (function(){
              const banner = document.querySelector('.quarto-title-banner');
              if (!banner) return;
              const c = document.createElement('canvas');
              c.id = 'wind';
              banner.prepend(c);
            })();
          </script>
          <script src="../../assets/hero.js" defer></script>
          <script src="../../assets/auto-collapse.js" defer></script>
    code-tools:
      toggle: false
      caption: "Source Code"